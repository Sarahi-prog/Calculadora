<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Neumórfica</title>
  <style>
    /* Fuente y reset */
    * {
      box-sizing: border-box;
      font-family: "Arial", sans-serif;
    }

    body {
      background: #e0e5ec;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .calculadora {
      background: #e0e5ec;
      padding: 30px;
      border-radius: 30px;
      box-shadow: 20px 20px 60px #bec3d0,
                  -20px -20px 60px #ffffff;
      width: 320px;
    }

    .pantalla {
      width: 100%;
      background: #e0e5ec;
      border: none;
      padding: 20px;
      font-size: 2em;
      border-radius: 20px;
      margin-bottom: 25px;
      box-shadow: inset 6px 6px 10px #bec3d0,
                  inset -6px -6px 10px #ffffff;
      text-align: right;
    }

    .botones {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    button {
      border: none;
      border-radius: 50%;
      padding: 20px;
      font-size: 1.5em;
      cursor: pointer;
      background: #e0e5ec;
      box-shadow: 6px 6px 10px #bec3d0,
                  -6px -6px 10px #ffffff;
      transition: all 0.2s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: inset 6px 6px 10px #bec3d0,
                  inset -6px -6px 10px #ffffff;
    }

    .operador {
      color: #ff8c42;
      font-weight: bold;
    }

    .igual {
      background: #06d6a0;
      color: white;
      grid-column: span 2;
      border-radius: 25px;
    }

    .clear {
      background: #ef476f;
      color: white;
      border-radius: 25px;
    }

    @media (max-width: 400px) {
      .calculadora {
        width: 90%;
      }
      .pantalla {
        font-size: 1.5em;
        padding: 15px;
      }
      button {
        font-size: 1.2em;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="calculadora">
    <input type="text" class="pantalla" id="pantalla" readonly>
    <div class="botones">
      <button class="clear">C</button>
      <button class="operador">(</button>
      <button class="operador">)</button>
      <button class="operador">/</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operador">*</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operador">-</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operador">+</button>

      <button>0</button>
      <button>.</button>
      <button class="igual">=</button>
    </div>
  </div>

  <script>
    const pantalla = document.getElementById('pantalla');
    const botones = document.querySelectorAll('button');

    botones.forEach(boton => {
      boton.addEventListener('click', () => {
        const valor = boton.textContent;

        if (boton.classList.contains('clear')) {
          pantalla.value = '';
          return;
        }

        if (boton.classList.contains('igual')) {
          try {
            pantalla.value = eval(pantalla.value);
          } catch {
            pantalla.value = 'Error';
          }
          return;
        }

        pantalla.value += valor;
      });
    });
  </script>
</body>
</html>
