<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora - Sarahi</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #2c3e50, #4ca1af);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .calculadora {
      background: #1e1e1e;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
      width: 320px;
    }

    .pantalla {
      background: #2b2b2b;
      color: #00ffae;
      font-size: 2em;
      border: none;
      border-radius: 10px;
      width: 100%;
      padding: 15px;
      text-align: right;
      margin-bottom: 15px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
    }

    .botones {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      font-size: 1.2em;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #333;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #444;
      transform: scale(1.05);
    }

    .operador {
      background: #0078d7;
    }

    .operador:hover {
      background: #0097ff;
    }

    .igual {
      background: #00b894;
      grid-column: span 2;
    }

    .igual:hover {
      background: #00e6b3;
    }

    .clear {
      background: #d63031;
    }

    .clear:hover {
      background: #ff4d4d;
    }
  </style>
</head>
<body>
  <div class="calculadora">
    <input type="text" class="pantalla" id="pantalla" readonly>
    <div class="botones">
      <button class="clear">C</button>
      <button class="operador">(</button>
      <button class="operador">)</button>
      <button class="operador">/</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operador">*</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operador">-</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operador">+</button>

      <button>0</button>
      <button>.</button>
      <button class="igual">=</button>
    </div>
  </div>

  <script>
    const pantalla = document.getElementById('pantalla');
    const botones = document.querySelectorAll('button');

    botones.forEach(boton => {
      boton.addEventListener('click', () => {
        const valor = boton.textContent;

        if (boton.classList.contains('clear')) {
          pantalla.value = '';
          return;
        }

        if (boton.classList.contains('igual')) {
          try {
            pantalla.value = eval(pantalla.value);
          } catch {
            pantalla.value = 'Error';
          }
          return;
        }

        pantalla.value += valor;
      });
    });
  </script>
</body>
</html>
