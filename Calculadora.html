<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Moderna - Sarahi</title>
  <style>
    /* Fuente y reset */
    * {
      box-sizing: border-box;
      font-family: "Roboto", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Contenedor de la calculadora */
    .calculadora {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      width: 350px;
      max-width: 90%;
    }

    /* Pantalla */
    .pantalla {
      background: #2b2b2b;
      color: #00ffae;
      font-size: 2em;
      border: none;
      border-radius: 15px;
      width: 100%;
      padding: 20px;
      text-align: right;
      margin-bottom: 20px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
    }

    /* Contenedor de botones */
    .botones {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      font-size: 1.3em;
      padding: 18px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      color: rgb(24, 2, 2);
    }

    button:hover {
      transform: scale(1.1);
    }

    /* Estilos especiales */
    .operador {
      background: #ff8c42;
    }

    .operador:hover {
      background: #ffa34d;
    }

    .igual {
      background: #06d6a0;
      grid-column: span 2;
    }

    .igual:hover {
      background: #18e6b0;
    }

    .clear {
      background: #ef476f;
    }

    .clear:hover {
      background: #ff6392;
    }

    /* Responsividad */
    @media (max-width: 400px) {
      .pantalla {
        font-size: 1.5em;
        padding: 15px;
      }
      button {
        font-size: 1.1em;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="calculadora">
    <input type="text" class="pantalla" id="pantalla" readonly>
    <div class="botones">
      <button class="clear">C</button>
      <button class="operador">(</button>
      <button class="operador">)</button>
      <button class="operador">/</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operador">*</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operador">-</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operador">+</button>

      <button>0</button>
      <button>.</button>
      <button class="igual">=</button>
    </div>
  </div>

  <script>
    const pantalla = document.getElementById('pantalla');
    const botones = document.querySelectorAll('button');

    botones.forEach(boton => {
      boton.addEventListener('click', () => {
        const valor = boton.textContent;

        if (boton.classList.contains('clear')) {
          pantalla.value = '';
          return;
        }

        if (boton.classList.contains('igual')) {
          try {
            pantalla.value = eval(pantalla.value);
          } catch {
            pantalla.value = 'Error';
          }
          return;
        }

        pantalla.value += valor;
      });
    });
  </script>
</body>
</html>
